<!DOCTYPE html>
<html lang="ja">
<head>
  <link rel="icon" href="favicon.png">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio | Learning</title>
  <meta
    name="description"
    content="Studyfolio のLearningページ。現在の学習状況を公開用に表示します。"
  >
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Noto+Sans+JP:wght@400;500;700;900&display=swap"
    rel="stylesheet"
  >
  <link rel="stylesheet" href="styles.css">
</head>
<body data-page="learning">
  <div class="page-shell">
    <header class="site-header compact-header">
      <nav class="topbar">
        <a class="brand" href="index.html">Portfolio</a>
        <div class="topbar-links">
          <a href="index.html" data-nav="home">Home</a>
          <a href="about.html" data-nav="about">About</a>
          <a href="portfolio.html" data-nav="portfolio">Portfolio</a>
          <a href="learning.html" data-nav="learning">Learning</a>
        </div>
      </nav>
    </header>

    <main>
      <section class="learning-toolbar" aria-label="Learning overview">
        <div>
          <p class="eyebrow">Learning</p>
          <h1>学習ログボード</h1>
        </div>
        <div class="learning-status-strip" aria-label="データの表示方式">
          <span>User Preview</span>
          <span>Static Data</span>
        </div>
      </section>

      <section class="section">
        <div class="learning-public-grid">
          <article class="panel task-insight-panel">
            <p class="card-label">Task Status</p>
            <h2 id="preview-panel-title">学習状況</h2>
            <div class="task-counts" aria-label="タスク数">
              <div>
                <span id="task-count-total">0</span>
                <small>Total</small>
              </div>
              <div>
                <span id="task-count-active">0</span>
                <small>Active</small>
              </div>
              <div>
                <span id="task-count-done">0</span>
                <small>Done</small>
              </div>
            </div>
            <div class="task-progress-list" aria-label="ステータス別の進捗">
              <div class="task-progress-row">
                <div>
                  <strong>これから</strong>
                  <span id="task-count-todo">0</span>
                </div>
                <span class="task-progress-track">
                  <span class="task-progress-fill task-progress-todo" id="task-progress-todo"></span>
                </span>
              </div>
              <div class="task-progress-row">
                <div>
                  <strong>進行中</strong>
                  <span id="task-count-active-row">0</span>
                </div>
                <span class="task-progress-track">
                  <span class="task-progress-fill task-progress-active" id="task-progress-active"></span>
                </span>
              </div>
              <div class="task-progress-row">
                <div>
                  <strong>完了</strong>
                  <span id="task-count-done-row">0</span>
                </div>
                <span class="task-progress-track">
                  <span class="task-progress-fill task-progress-done" id="task-progress-done"></span>
                </span>
              </div>
            </div>
            <p class="task-insight-note" id="task-limit-note">最新4件を表示します。</p>
          </article>

          <article class="panel task-list-panel">
            <p class="card-label">Current Tasks</p>
            <h3>公開中の学習タスク</h3>
            <div id="preview-task-list" class="task-list preview-task-list"></div>
          </article>
        </div>
      </section>
    </main>
  </div>

  <script src="data/learning-tasks.js"></script>
  <script src="script.js"></script>
</body>
</html>
