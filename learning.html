<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio | Learning</title>
  <meta
    name="description"
    content="Studyfolio のLearningページ。現在の学習テーマと進行中タスクを管理します。"
  >
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Noto+Sans+JP:wght@400;500;700;900&display=swap"
    rel="stylesheet"
  >
  <link rel="stylesheet" href="styles.css">
</head>
<body data-page="learning">
  <div class="page-shell">
    <header class="site-header compact-header">
      <nav class="topbar">
        <a class="brand" href="index.html">Portfolio</a>
        <div class="topbar-links">
          <a href="index.html" data-nav="home">Home</a>
          <a href="about.html" data-nav="about">About</a>
          <a href="portfolio.html" data-nav="portfolio">Portfolio</a>
          <a href="learning.html" data-nav="learning">Learning</a>
        </div>
      </nav>
    </header>

    <main>
      <section class="learning-toolbar" aria-label="Learning overview">
        <div>
          <p class="eyebrow">Learning</p>
          <h1>学習ログボード</h1>
        </div>
        <div class="learning-status-strip" aria-label="現在の学習状態">
          <button class="button button-primary button-small" type="button" id="task-open-button">タスクを追加</button>
        </div>
      </section>

      <section class="section">
        <div class="task-board-grid">
          <article class="panel task-insight-panel">
            <p class="card-label">Task Status</p>
            <h3>今の進み具合</h3>
            <div class="task-counts" aria-label="タスク数">
              <div>
                <span id="task-count-total">0</span>
                <small>Total</small>
              </div>
              <div>
                <span id="task-count-active">0</span>
                <small>Active</small>
              </div>
              <div>
                <span id="task-count-done">0</span>
                <small>Done</small>
              </div>
            </div>
            <div class="task-progress-list" aria-label="ステータス別の進捗">
              <div class="task-progress-row">
                <div>
                  <strong>これから</strong>
                  <span id="task-count-todo">0</span>
                </div>
                <span class="task-progress-track">
                  <span class="task-progress-fill task-progress-todo" id="task-progress-todo"></span>
                </span>
              </div>
              <div class="task-progress-row">
                <div>
                  <strong>進行中</strong>
                  <span id="task-count-active-row">0</span>
                </div>
                <span class="task-progress-track">
                  <span class="task-progress-fill task-progress-active" id="task-progress-active"></span>
                </span>
              </div>
              <div class="task-progress-row">
                <div>
                  <strong>完了</strong>
                  <span id="task-count-done-row">0</span>
                </div>
                <span class="task-progress-track">
                  <span class="task-progress-fill task-progress-done" id="task-progress-done"></span>
                </span>
              </div>
            </div>
            <p class="task-insight-note" id="task-limit-note">最新4件を表示します。</p>
          </article>

          <article class="panel task-list-panel">
            <div class="task-list-header">
              <div>
                <p class="card-label">Current Tasks</p>
                <h3>学習中のタスク</h3>
              </div>
              <button class="button button-secondary button-small" type="button" id="task-reset-button">すべて削除</button>
            </div>
            <div id="task-list" class="task-list"></div>
          </article>
        </div>
      </section>

      <dialog class="task-dialog" id="task-dialog" aria-labelledby="task-dialog-title">
        <div class="task-dialog-card">
          <div class="task-dialog-header">
            <div>
              <p class="card-label">Task Input</p>
              <h3 id="task-dialog-title">今やっているタスクを追加する</h3>
            </div>
            <button class="dialog-close-button" type="button" id="task-close-button" aria-label="閉じる">×</button>
          </div>
          <form id="task-form" class="task-form">
            <label>
              タスク名
              <input type="text" id="task-title-input" name="title" placeholder="例: ポートフォリオの作品詳細ページを考える" required>
            </label>
            <label>
              ステータス
              <select id="task-status-input" name="status">
                <option value="進行中">進行中</option>
                <option value="これから">これから</option>
                <option value="完了">完了</option>
              </select>
            </label>
            <label>
              メモ
              <textarea id="task-note-input" name="note" rows="4" placeholder="何を進めているか、次に何をするかを書けます"></textarea>
            </label>
            <button class="button button-primary" type="submit">タスクを追加</button>
          </form>
        </div>
      </dialog>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
